services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: voice_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  voice-platform:
    build:
      context: ./voice-platform
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./voice-platform/.env
    environment:
      DATABASE_URL: "postgresql://user:password@postgres:5432/voice_ai"
    volumes:
      - ./voice-platform:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - postgres

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./worker/.env
    environment:
      VOICE_PLATFORM_URL: "http://voice-platform:3000"
    depends_on:
      - voice-platform

volumes:
  pgdata:
